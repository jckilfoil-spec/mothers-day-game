<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4a56c" />
    <meta name="description" content="A warm, painted-style platformer made for Mother's Day. Upload a photo, become the hero." />
    <title>A Game for Mom</title>

    <!-- Favicon — SVG renders crisp at any size in modern browsers. -->
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <!-- iOS Add-to-Home-Screen needs PNG. Generated by `node scripts/generate-icons.mjs`. -->
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png" />

    <!-- Open Graph / iMessage / Slack / Discord unfurl. og-image.png is generated
         from icon.svg by the same script. Square (1200×1200) since iMessage prefers it. -->
    <meta property="og:title" content="A Game for Mom 🌸" />
    <meta property="og:description" content="A tiny watercolor adventure where mom is the hero. Made for Mother's Day." />
    <meta property="og:image" content="https://jckilfoil-spec.github.io/mothers-day-game/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1200" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jckilfoil-spec.github.io/mothers-day-game/" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fredoka:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/app.css" />
    <!--
      Analytics bootstrap. Per HANDOFF: must run BEFORE any other custom script.
      Sets window.track to a no-op shim immediately so callsites are safe pre-consent.
      On Accept, loads PostHog, replaces window.track with the real ph.capture wrapper,
      fires `install_check` canary, and binds error + Tally postMessage listeners.
      On Decline, never loads PostHog. Zero PostHog network calls.
    -->
    <script>
    (function () {
      var STORAGE_KEY = 'cookie_consent';
      var POSTHOG_KEY = 'phc_AJd2cbqkwAnJY7FFFSGmLcPSbDR75Si2Kc6SKqWpN2Vj';
      var POSTHOG_HOST = 'https://us.i.posthog.com';

      // No-op shim. Game code calls window.track everywhere; becomes real after init.
      window.track = function () {};

      function loadAndInitPostHog() {
        return new Promise(function (resolve) {
          // Official PostHog snippet (https://posthog.com/docs/libraries/js).
          // If you refresh this, copy verbatim — abbreviated/blog versions go stale.
          !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]),t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.async=!0,p.src=s.api_host+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(void 0!==a?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return"posthog"!==a&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+".people (stub)"},o="capture identify alias people.set people.set_once set_config register register_once unregister opt_out_capturing has_opted_out_capturing opt_in_capturing reset isFeatureEnabled onFeatureFlags getFeatureFlag getFeatureFlagPayload reloadFeatureFlags group updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures getActiveMatchingSurveys getSurveys onSessionId".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||[]);

          posthog.init(POSTHOG_KEY, {
            api_host: POSTHOG_HOST,
            autocapture: true,
            capture_pageview: true,
            capture_pageleave: true,
            session_recording: { maskAllInputs: true },
            loaded: function (ph) { resolve(ph); }
          });
        });
      }

      function initAnalytics() {
        loadAndInitPostHog().then(function (ph) {
          // Canary: should appear in PostHog Live Events within ~30s.
          ph.capture('install_check', { version: 1, ts: Date.now() });
          // eslint-disable-next-line no-console
          console.log('[analytics] PostHog initialized; install_check fired.');

          // Real tracker — game code keeps calling window.track(...).
          window.track = function (event, props) { ph.capture(event, props || {}); };

          // Global error tracking — supplements PostHog's autocapture errors.
          window.addEventListener('error', function (ev) {
            ph.capture('client_error', {
              message: ev.message,
              filename: ev.filename,
              lineno: ev.lineno,
              colno: ev.colno
            });
          });
          window.addEventListener('unhandledrejection', function (ev) {
            ph.capture('client_unhandled_rejection', {
              reason: String(ev.reason && (ev.reason.message || ev.reason))
            });
          });

          // Tally postMessage → feedback_submitted. Tally posts both object-shaped
          // ({ event: 'Tally.FormSubmitted', payload: {...} }) and (older) string
          // messages; handle both. Origin-pinned to tally.so so an embedding
          // iframe can't spoof feedback events to pollute analytics.
          window.addEventListener('message', function (ev) {
            if (ev.origin !== 'https://tally.so') return;
            var data = ev.data;
            var isTallySubmit =
              (data && data.event === 'Tally.FormSubmitted') ||
              (typeof data === 'string' && data.indexOf('Tally.FormSubmitted') !== -1);
            if (isTallySubmit) {
              ph.capture('feedback_submitted', {
                form_id: (data && data.payload && data.payload.formId) || 'VLvlM6'
              });
            }
          });
        }).catch(function (err) {
          // eslint-disable-next-line no-console
          console.warn('[analytics] PostHog failed to load', err);
        });
      }

      function readDecision() {
        try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; }
      }
      function writeDecision(v) {
        try { localStorage.setItem(STORAGE_KEY, v); } catch (e) {}
      }

      function bindConsentBanner() {
        var banner = document.getElementById('cookie-consent');
        var decision = readDecision();

        // Track Feedback button clicks regardless of consent — pre-consent the
        // call is a no-op shim, so this is safe.
        var fbBtn = document.querySelector('.feedback-btn');
        if (fbBtn) {
          fbBtn.addEventListener('click', function () {
            window.track('feedback_button_clicked');
          });
        }

        if (decision === 'accepted') {
          if (banner) banner.style.display = 'none';
          initAnalytics();
          return;
        }
        if (decision === 'declined') {
          if (banner) banner.style.display = 'none';
          return;
        }
        if (!banner) return;
        var acceptBtn = document.getElementById('cookie-accept');
        var declineBtn = document.getElementById('cookie-decline');
        if (acceptBtn) acceptBtn.addEventListener('click', function () {
          writeDecision('accepted');
          banner.style.display = 'none';
          initAnalytics();
        });
        if (declineBtn) declineBtn.addEventListener('click', function () {
          writeDecision('declined');
          banner.style.display = 'none';
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bindConsentBanner);
      } else {
        bindConsentBanner();
      }
    })();
    </script>
    <script async src="https://tally.so/widgets/embed.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <button
      class="feedback-btn"
      data-tally-open="VLvlM6"
      data-tally-layout="modal"
      data-tally-width="500"
      data-tally-emoji-text="💌"
      data-tally-emoji-animation="wave"
      type="button"
      aria-label="Leave feedback">
      💌 Feedback
    </button>
    <!-- Cookie consent. Bound by the inline script in <head>. Hidden by CSS during
         gameplay (body.gameplay-active) and on the win screen (body.final-screen). -->
    <div id="cookie-consent" class="cookie-consent" role="dialog" aria-live="polite" aria-label="Cookie consent">
      <p class="cookie-consent__text">
        This site uses cookies for anonymous analytics and session recordings (text inputs masked).
        <a href="./privacy.html" target="_blank" rel="noopener">Privacy</a>.
      </p>
      <div class="cookie-consent__actions">
        <button type="button" id="cookie-decline" class="cookie-btn cookie-btn--ghost">Decline</button>
        <button type="button" id="cookie-accept" class="cookie-btn cookie-btn--primary">Accept all</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
